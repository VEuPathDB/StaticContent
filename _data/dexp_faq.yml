- type: uploading datasets 
  question: "What types of datasets can I upload to dataExplorer?"
  answer: |
           dataExplorer supports any dataset that can be represented as a flat file (i.e., a single data table), regardless of whether the data comes from the life sciences, environmental studies, business analytics, or any other field. 
