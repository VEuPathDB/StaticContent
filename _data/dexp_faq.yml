--- # dataexplorer faq page
- type: general
  question: "What is FAIR data, and how does dataExplorer help make my data FAIR?"
  answer: |
           FAIR (Findable, Accessible, Interoperable, and Reusable) data adhere to a set of widely adopted principles that ensure datasets can be easily discovered, understood, and used by others (and by you in the future). For more information, see: https://rdcu.be/fbgiu
           - <b>Findable</b>: Data are described with rich metadata and indexed so they can be discovered through searches
           - <b>Accessible</b>: Data can be retrieved using clear access conditions (e.g., open, controlled, or permission-based).
           - <b>Interoperable</b>: Data use standardized formats, consistent variable descriptions, and (where possible) shared vocabularies to support integration with other datasets.
           -<b>Reusable</b>: Data include sufficient documentation and context (e.g., definitions, methods, provenance) to enable appropriate reuse.
           
           dataExplorer is designed to help you make your datasets FAIR with minimal overhead:
           - <b>Findable</b>: Your dataset becomes searchable by dataset name, identifier, description, variables, and value labels, making it easier for others to discover relevant data.
           - <b>Accessible</b>: You control when to grant Community Access to your dataset, which makes it open access. Once shared as a Community-Contributed Dataset, it can be discovered, explored, and downloaded by other users. Private and Individual Access levels support collaboration and early-stage data sharing. However, to be fully FAIR, datasets should be broadly discoverable and accessible.
           - <b>Interoperable</b>: Community-Contributed datasets require you to provide variable annotations, ensuring each variable has a clear label and definition. This improves consistency and lays the foundation for future harmonization across datasets.
           - <b>Reusable</b>: Dataset-level metadata provide essential context and establish provenance, while built-in exploratory tools allow users to assess variable coverage, data completeness, and distributions before downloading, supporting appropriate interpretation and reuse.
           
           By combining structured metadata, clear documentation, flexible sharing infrastructure, and interactive exploration tools, dataExplorer helps transform your dataset from a static file into a well-documented, discoverable, and reusable research resource, while you retain full control over when it is shared.

